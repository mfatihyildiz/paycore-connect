services:
  postgres:
    image: postgres:16
    container_name: paycore-postgres
    restart: always
    environment:
      POSTGRES_USER: paycore
      POSTGRES_PASSWORD: paycore
      POSTGRES_DB: paycore_merchant_db
    ports:
      - "5432:5432"
    volumes:
      - paycore_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: paycore-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - paycore_redis_data:/data

  kafka:
    image: apache/kafka:4.1.0
    container_name: paycore-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@paycore-kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  mongodb:
    image: mongo:7
    container_name: paycore-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: paycore
      MONGO_INITDB_ROOT_PASSWORD: paycore
    ports:
      - "27017:27017"
    volumes:
      - paycore_mongodb_data:/data/db

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: paycore-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: paycore
      RABBITMQ_DEFAULT_PASS: paycore
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - paycore_rabbitmq_data:/var/lib/rabbitmq

  merchant-dashboard:
    build:
      context: ../frontend/merchant-dashboard
      dockerfile: Dockerfile.dev
    container_name: paycore-merchant-dashboard
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ../frontend/merchant-dashboard:/app
      - paycore_merchant_dashboard_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8090

volumes:
  paycore_postgres_data:
  paycore_redis_data:
  paycore_kafka_data:
  paycore_mongodb_data:
  paycore_rabbitmq_data:
  paycore_merchant_dashboard_node_modules: