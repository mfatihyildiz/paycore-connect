server:
  port: 8083

spring:
  application:
    name: ledger-service

  datasource:
    url: jdbc:postgresql://localhost:5432/paycore_ledger_db
    username: paycore
    password: paycore
    driver-class-name: org.postgresql.Driver

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ledger-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.paycore.ledger.event.PaymentEvent

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

paycore:
  kafka:
    topics:
      payment-events: payment-events

management:
  endpoints:
    web:
      exposure:
        include: health,info