server:
  port: 8081

spring:
  application:
    name: merchant-service

  datasource:
    url: jdbc:postgresql://localhost:5432/paycore_merchant_db
    username: paycore
    password: paycore
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info