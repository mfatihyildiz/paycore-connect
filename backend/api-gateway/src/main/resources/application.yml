server:
  port: 8090

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: merchant-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/merchants/**

            - id: payment-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/payments/**

            - id: ledger-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/ledger/**

            - id: settlement-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/settlements/**

            - id: fraud-service
              uri: http://localhost:8086
              predicates:
                - Path=/api/fraud/**

            - id: notification-service
              uri: http://localhost:8087
              predicates:
                - Path=/api/notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health,info